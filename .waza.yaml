# Microsoft Waza configuration for the ~/.ai-hub skill control plane.
# Enforces a moderate workspace standard: SKILL.md should stay ≤750 tokens.
# Distributed to governed projects via sync/ssot-relink.sh.

tokens:
  warningThreshold: 700
  fallbackLimit: 750
  limits:
    defaults:
      "SKILL.md": 750
      "references/**/*.md": 1000
      "*.md": 2000
    overrides:
      "README.md": 3000
      "CLAUDE.md": 3000
      "GEMINI.md": 3000
      "docs/**/*.md": 5000
      "docs/references/**/*.md": 15000
      "docs/prompts/**/*.md": 10000
      "docs/architecture/**/*.md": 10000
      ".agents/skills/frontend-slides/STYLE_PRESETS.md": 3000
      # AGENTS.md intentionally uses the default *.md limit (2000 tokens).

paths:
  skills:
    - skills
    - .agents/skills
